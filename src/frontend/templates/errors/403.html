{% extends "base.html" %}
{% block title %}Access Denied{% endblock %}
{% block content %}
<section class="py-16" style="min-height: 60vh; display:flex; align-items:center;">
    <div class="container max-w-4xl text-center">
        <div style="font-size:6rem; font-weight:800; color:var(--warning-light); line-height:1; margin-bottom:var(--space-4);">403</div>
        <h1 class="text-3xl font-bold mb-4">Access Denied</h1>
        <p class="text-secondary text-lg mb-4">You don't have permission to access this page.</p>
        <p class="text-muted mb-8">Please log in or contact support if you think this is a mistake.</p>
        <div class="flex gap-4 justify-center flex-wrap">
            <a href="/login" class="btn btn-primary btn-lg">
                <i class="fas fa-sign-in-alt mr-2" aria-hidden="true"></i>Log In
            </a>
            <a href="/" class="btn btn-outline btn-lg">
                <i class="fas fa-home mr-2" aria-hidden="true"></i>Go to Home
            </a>
        </div>
    </div>
</section>
{% endblock %}
