{% extends "base.html" %}
{% block title %}Page Not Found{% endblock %}
{% block content %}
<section class="py-16" style="min-height: 60vh; display:flex; align-items:center;">
    <div class="container max-w-4xl text-center">
        <div style="font-size:6rem; font-weight:800; color:var(--primary-200); line-height:1; margin-bottom:var(--space-4);">404</div>
        <h1 class="text-3xl font-bold mb-4">Page Not Found</h1>
        <p class="text-secondary text-lg mb-8">The page you're looking for doesn't exist or has been moved.</p>
        <div class="flex gap-4 justify-center flex-wrap">
            <a href="/" class="btn btn-primary btn-lg">
                <i class="fas fa-home mr-2" aria-hidden="true"></i>Go to Home
            </a>
            <a href="/diseases-list" class="btn btn-outline btn-lg">
                <i class="fas fa-book-medical mr-2" aria-hidden="true"></i>Browse Diseases
            </a>
        </div>
    </div>
</section>
{% endblock %}
